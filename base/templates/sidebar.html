<style>
    /* --- SIDEBAR CONTAINER CONSTRAINTS --- */
    .sidebar {
        width: 280px;
        min-width: 280px;
        max-width: 280px;
        background-color: #FAF6F0; /* Off-white canvas tone matching dictionary background */
        padding: 40px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-right: 1px solid #ebd9c0;
        box-sizing: border-box;
        height: 100vh; /* Fills full vertical viewport height */
    }

    /* --- USER PROFILE CARD CARDINALITY --- */
    .profile-card {
        text-align: center;
        width: 100%;
        margin-bottom: 10px;
    }

    .avatar-container {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        margin: 0 auto 14px auto;
        border: 1px solid #ccc;
        background-color: #fff;
    }

    .avatar-large {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .profile-card h3 {
        color: #2c3e50;
        font-size: 22px;
        font-weight: 700;
        margin: 0;
        line-height: 1.2;
    }

    .profile-card .subtitle {
        color: #8c8573;
        font-size: 14px;
        font-weight: 500;
        margin: 4px 0 0 0;
    }

    /* --- SECTION SEPARATOR LINE --- */
    .sidebar-divider {
        width: 100%;
        border: 0;
        border-top: 1px solid #ebd9c0;
        margin: 20px 0;
    }

    /* --- NAVIGATION LINKS GRID --- */
    .sidebar-menu {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-grow: 1;
    }

    .menu-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 18px;
        color: #4a4a4a;
        text-decoration: none;
        font-weight: 500;
        font-size: 16px;
        border-radius: 25px;
        transition: all 0.2s ease;
    }

    /* Dynamic State Classes */
    .menu-item.active {
        background-color: #d1e7e4;
        color: #0c5a53;
        font-weight: 600;
    }

    .menu-item:hover:not(.active) {
        background-color: #e2d9c5;
        color: #0c5a53;
    }

    /* --- BOTTOM FLOATING CTA ACTION BUTTON --- */
    .start-lesson-btn {
        width: 100%;
        padding: 14px;
        border-radius: 25px;
        border: none;
        background-color: #0c5a53;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(12, 90, 83, 0.2);
        transition: background 0.2s ease;
        margin-top: auto; /* Pushes button directly to page base footer area */
    }

    .start-lesson-btn:hover {
        background-color: #083e39;
    }
</style>


<aside class="sidebar">
    <div class="profile-card">
        <div class="avatar-container">
            <img src="{{ request.user.profile.profile_picture.url }}" alt="User Profile Avatar" class="avatar-large">
        </div>
        <h3>{{ request.user.first_name|default:request.user.username }}</h3>
        <p class="subtitle">Fluent in ASL</p>
    </div>

    <hr class="sidebar-divider">

    <nav class="sidebar-menu">
    <a href="{% url 'user_profile' %}" class="menu-item {% if request.resolver_match.url_name == 'user_profile' %}active{% endif %}">
        <span class="icon">👤</span> Profile
    </a>

    <a href="{% url 'progress' %}" class="menu-item {% if request.resolver_match.url_name == 'progress' or 'progress' in request.path %}active{% endif %}">
        <span class="icon">🏆</span> Achievements
    </a>

    <a href="{% url 'setting' %}" class="menu-item {% if request.resolver_match.url_name == 'setting' %}active{% endif %}">
        <span class="icon">⚙️</span> Settings
    </a>
</nav>
</aside>
