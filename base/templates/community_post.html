{% include 'navbar.html' %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .dashboard-container {
            display: flex;
            width: 100%;
            min-height: calc(100vh - 70px);
            background-color: #fcf8f2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 900px;
            margin: 0 auto;
            width: calc(100% - 280px);
            box-sizing: border-box;
        }
        .content-header h2 { font-size: 28px; color: #1a1a1a; font-weight: 700; margin: 0; }
        .composer-card { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid #ebd9c0; }
        .input-field { width: 100%; border: 1px solid #ebd9c0; border-radius: 12px; padding: 12px 16px; font-family: inherit; font-size: 14px; background-color: #fafbfc; box-sizing: border-box; margin-bottom: 12px; outline: none; }
        .input-field:focus { border-color: #0c5a53; background-color: #fff; }
        .textarea-field { min-height: 100px; resize: vertical; }
        .btn-teal { background-color: #0c5a53; border: none; padding: 12px 24px; border-radius: 25px; font-weight: 600; cursor: pointer; color: #fff; font-size: 14px; float: right; }
        .clearfix::after { content: ""; clear: both; display: table; }
        .feed-container { display: flex; flex-direction: column; gap: 16px; margin-top: 10px; }
        .post-card { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.01); border: 1px solid rgba(235, 217, 192, 0.5); }
        .post-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .user-avatar { width: 40px; height: 40px; background-color: #e3f2f0; color: #0c5a53; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
        .meta-details h4 { margin: 0; font-size: 15px; color: #222; font-weight: 600; }
        .meta-details p { margin: 2px 0 0 0; font-size: 12px; color: #8c8573; }
        .post-title { font-size: 19px; color: #1a1a1a; font-weight: 700; margin: 0 0 8px 0; }
        .post-content { font-size: 15px; color: #4a4a4a; line-height: 1.6; margin: 0 0 16px 0; white-space: pre-line; }
    </style>
</head>

<div class="dashboard-container">
    {% include 'sidebar.html' %}

    <main class="main-content">
        <header class="content-header">
            <h2>Community Posts</h2>
        </header>

        <!-- Form action posts directly to our new endpoint -->
        <div class="composer-card">
                <form method="POST" action="{% url 'community_post_feed' %}" enctype="multipart/form-data" class="clearfix">
                    {% csrf_token %}
                    <input type="text" name="title" class="input-field" placeholder="Post Topic..." required>
                    <textarea name="content" class="input-field textarea-field" placeholder="Share your update..." required></textarea>

    <!-- Add File Input -->
                    <input type="file" name="image" accept="image/*" class="input-field" style="padding: 8px;">

                    <button type="submit" class="btn-teal">Publish Post</button>
                </form>
        </div>
    </main>
</div>
